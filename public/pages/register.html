<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="generator" content="GitLab Pages" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="../styles/generic.css" />
    <link rel="stylesheet" href="../styles/register.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://kit.fontawesome.com/f06588c779.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <nav class="flexAlign">
      <div class="nav-left"></div>
      <div class="nav-center">
        <a href="/" class="fa-2x"><p>TracFit</p></a>
        <h1> - Account Registration</h1>
      </div>
      <div class="nav-right">
        <a href="account"><i class="fa-3x fa-regular fa-user"></i></a>
      </div>
    </nav>

    <div class="main">

        <form class="mainContainer flexAlign" method="POST" action="/register">          
          <label for="firstName">First name:</label>
          <input type="text" id="firstName" name="firstName" placeholder="John" autocomplete="given-name"/><br>

          <label for="familyName">Family name:</label>
          <input type="text" id="familyName" name="familyName" placeholder="Doe" autocomplete="family-name"/><br>

          <label for="username">Username:</label>
          <input type="text" id="username" name="username" placeholder="Username" required><br>

          <label for="dob">Date of Birth:</label>
          <input type="date" id="dob" name="dob" required><br>

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="email.@email.com" autocomplete="email"/><br>

          <label for="password">Password:</label>
          <input type="password" id="password" name="password" placeholder="Password" autocomplete="new-password"><br>

          <input type="submit" value="Register"/>

          <p class="login-link">Already have an account? <a href="login">Login</a></p>
        </form>
    </div>
  </body>
    <script src="../scripts/auth.js"></script>
</html>
