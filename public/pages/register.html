<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="generator" content="GitLab Pages" />
    <title>Register</title>
    <link rel="stylesheet" href="../styles/generic.css" />
    <link rel="stylesheet" href="../styles/register.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://kit.fontawesome.com/f06588c779.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <nav>
      <div class="nav-left"></div>
      <div class="nav-center">
        <h1>TracFit - Account Registration</h1>
      </div>
      <div class="nav-right">
        <a href="account.html"><i class="fa-3x fa-regular fa-user"></i></a>
      </div>
    </nav>

    <div class="main">

        <form class="mainContainer">
          <label for="firstName">First name:</label>
          <input type="text" id="firstName" placeholder="John" autocomplete="given-name"/><br>

          <label for="familyName">Family name:</label>
          <input type="text" id="familyName" placeholder="Doe" autocomplete="family-name"/><br>

          <label for="username">Username:</label>
          <input type="text" id="username" placeholder="Username" required><br>

          <label for="dob">Date of Birth:</label>
          <input type="date" id="dob" required><br>

          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="email.@email.com" autocomplete="email"/><br>

          <label for="password">Password:</label>
          <input type="password" id="password" placeholder="Password" autocomplete="new-password"><br>

          <input type="submit" value="Register"/>
        </form>
    </div>
  </body>
</html>
