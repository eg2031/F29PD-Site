    <nav>
      <h1>TracFit - Account Registration</h1>

    <div class="main">
      <div class="formWrapper">
        <form class="registrationForm">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="email.@email.com" autocomplete="email"/><br>

          <label for="password">Password:</label>

        </form>
      </div>
