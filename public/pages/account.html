<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="generator" content="GitLab Pages" />
    <title>Account</title>
    <link rel="stylesheet" href="../styles/generic.css" />
    <link rel="stylesheet" href="../styles/account.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/f06588c779.js"
      crossorigin="anonymous"
    ></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("deleteAccountBtn").addEventListener("click", async () => {
          const confirmDelete = confirm("Are you sure you want to delete your account? This cannot be undone.");

          if (!confirmDelete) return;

          const res = await fetch("/api/delete-account", {
            method: "POST"
          });

          if (res.ok) {
            alert("Account deleted.");
            window.location.href = "/pages/login.html";
          } else {
            alert("Failed to delete account.");
          }
        });
      });
    </script>
  </head>
  <body>
    <nav class="flexAlign">
      <div class="nav-left"></div>
      <a href="/" class="fa-2x"><p>TracFit</p></a>
        <h1> - Account</h1>
      <div class="nav-right">
        <a href="dashboard"><i class="fa-3x fa-regular fa-house"></i></a>
        <a href="account"><i class="fa-3x fa-regular fa-user"></i></a>
      </div>
    </nav>

    <div class="main">
      <div class="mainContainer flexAlign">
        <div class="container">
          <h1>Account Information:</h1>
          <ul>
            <li>
              <div>
                <h2>User ID:</h2>
                <p>001</p>
              </div>
            </li>
            <li>
              <div>
                <h2>Username:</h2>
                <p>john001</p>
              </div>
            </li>
            <li>
              <div>
                <h2>First Name:</h2>
                <p>John</p>
              </div>
            </li>
            <li>
              <div>
                <h2>Family Name:</h2>
                <p>Doe</p>
              </div>
            </li>
          </ul>
          <button id="deleteAccountBtn" class="deleteAccountBtn">
          Delete Account
          </button>
        </div>
      </div>
    </div>
  </body>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/account.js"></script>
</html>
