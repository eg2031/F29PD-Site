<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="generator" content="GitLab Pages" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="../styles/generic.css" />
    <link rel="stylesheet" href="../styles/dashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/f06588c779.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <nav class="flexAlign">
      <div class="nav-left">
        <a href="register">register</a>
        <a href="login">login</a>
        <a href="browseData">browseData</a>
      </div>
      <div class="nav-center">
        <a href="/" class="fa-2x"><p>TracFit</p></a>
      </div>
      <div class="nav-right">
        <a href="dashboard"><i class="fa-3x fa-regular fa-house"></i></a>
        <a href="account"><i class="fa-3x fa-regular fa-user"></i></a>
      </div>
    </nav>

    <div class="main">
      <div class="row 1">
        <div class="column CurrentGoal">
          <div class="row">
            <div class="column container">
              <div class="currentGoal">
                <h1 class="containerTitle">Weight Loss Goal</h1>
                <div class="goalProgress">
                  <div id="goalDisplay">
                    <p id="goalStats">Loading...</p>
                    <progress id="weightProgress" value="0" max="100"></progress>
                    <p id="goalSetPrompt"></p>
                  </div>
                  <div class="goalSetForm">
                    <label for="weightGoalInput">Set goal weight (kg):</label>
                    <input type="number" id="weightGoalInput" placeholder="e.g. 70" min="1" step="0.1" />
                    <button onclick="saveWeightGoal()">Save</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="column container healthMetrics">
          <h1>Health Metrics</h1>
          <div class="row">
            <div class="column healthMetric">
              <h2>Avg. rest heartrate:</h2>
              <p id="avgRestHR">-</p>
            </div>
            <div class="column healthMetric">
              <h2>Avg. active heartrate:</h2>
              <p id="avgActiveHR">-</p>
            </div>
          </div>
          <div class="row">
            <div class="column healthMetric">
              <h2>Avg. blood pressure:</h2>
              <p id="avgBP">-</p>
            </div>
            <div class="column healthMetric">
              <h2>Avg. fluid intake:</h2>
              <p id="avgFluid">-</p>
            </div>
          </div>
        </div>
      </div>
      <div class="row 2">
        <div class="column container">
          <h1 class="containerTitle">Store your data:</h1>
          <div class="dataEntrySection">
            <div class="datePickerRow">
              <label for="recordDate">Date:</label>
              <input type="date" id="recordDate" />
            </div>
            <div class="statTabs">
              <button class="statTab active" data-form="caloriesForm">Calories</button>
              <button class="statTab" data-form="stepsForm">Steps</button>
              <button class="statTab" data-form="fluidIntakeForm">Fluid Intake</button>
              <button class="statTab" data-form="weightForm">Weight</button>
              <button class="statTab" data-form="restHRForm">Rest HR</button>
              <button class="statTab" data-form="activeHRForm">Active HR</button>
              <button class="statTab" data-form="bpForm">Blood Pressure</button>
            </div>
            <div class="formArea">
              <form id="caloriesForm" class="flexAlign dataForm active">
                <label for="calories">Calories:</label>
                <input type="number" id="calories" placeholder="1000" min="1" />
                <input type="submit" value="Submit" />
              </form>
              <form id="stepsForm" class="flexAlign dataForm">
                <label for="steps">Steps:</label>
                <input type="number" id="steps" placeholder="10000" min="1" />
                <input type="submit" value="Submit" />
              </form>
              <form id="fluidIntakeForm" class="flexAlign dataForm">
                <label for="fluidIntake">Fluid intake (ml):</label>
                <input type="number" id="fluidIntake" placeholder="3000" min="1" />
                <input type="submit" value="Submit" />
              </form>
              <form id="weightForm" class="flexAlign dataForm">
                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" placeholder="70" min="1" step="0.1" />
                <input type="submit" value="Submit" />
              </form>
              <form id="restHRForm" class="flexAlign dataForm">
                <label for="restHR">Resting heart rate (bpm):</label>
                <input type="number" id="restHR" placeholder="70" min="1" />
                <input type="submit" value="Submit" />
              </form>
              <form id="activeHRForm" class="flexAlign dataForm">
                <label for="activeHR">Active heart rate (bpm):</label>
                <input type="number" id="activeHR" placeholder="120" min="1" />
                <input type="submit" value="Submit" />
              </form>
              <form id="bpForm" class="flexAlign dataForm">
                <label for="systolic">Systolic:</label>
                <input type="number" id="systolic" placeholder="120" min="1" />
                <label for="diastolic">Diastolic:</label>
                <input type="number" id="diastolic" placeholder="80" min="1" />
                <input type="submit" value="Submit" />
              </form>
            </div>
          </div>
        </div>
        <div class="column container leaderboard">
          <h1 class="containerTitle">Friends Leaderboard</h1>

          <div class="friendActions">
            <input type="text" id="friendSearchInput" placeholder="Search username/email" />
            <button id="friendSearchBtn" type="button">Find Users</button>
          </div>

          <div id="friendSearchResults"></div>

          <h2>Pending Requests</h2>
          <div id="pendingRequests"></div>

          <h2>Leaderboard</h2>
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>User</th>
                <th>Steps Today</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
              <tr>
                <td colspan="3">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/dashboard.js"></script>
  </body>
</html>
