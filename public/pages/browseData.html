<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="generator" content="GitLab Pages" />
    <title>Data</title>
    <link rel="stylesheet" href="../styles/generic.css" />
    <link rel="stylesheet" href="../styles/browseData.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/f06588c779.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav class="flexAlign">
      <div class="nav-left"></div>
      <div class="nav-center">
        <a href="index.html" class="fa-2x"><p>TracFit</p></a>
        <h1> - Data</h1>
      </div>
      <div class="nav-right">
        <a href="dashboard.html"><i class="fa-3x fa-regular fa-house"></i></a>
        <a href="account.html"><i class="fa-3x fa-regular fa-user"></i></a>
      </div>
    </nav>

    <div class="main">
      <div class="dataContainer">
        <div class="row">
          <div class="column container">
            <h1 class="containerTitle">Your Data</h1>
          </div>
        </div>

        <div class="filterBar">
          <div class="filterGroup">
            <label for="filterFrom">From:</label>
            <input type="date" id="filterFrom" />
          </div>
          <div class="filterGroup">
            <label for="filterTo">To:</label>
            <input type="date" id="filterTo" />
          </div>
          <div class="quickFilters">
            <button class="quickFilter" data-days="7">7 days</button>
            <button class="quickFilter" data-days="30">30 days</button>
            <button class="quickFilter" data-days="90">90 days</button>
            <button class="quickFilter" data-days="365">1 year</button>
            <button class="quickFilter" data-days="0">All time</button>
          </div>
          <button id="applyFilter" class="applyBtn">Apply</button>
        </div>

        <div id="noData" style="display:none;text-align:center;color:white;padding:2rem;">
          <p>No data recorded yet. Go to the dashboard to start logging.</p>
        </div>

        <div id="chartsArea">
          <div id="summaryStats" class="row summaryRow"></div>

          <div class="row">
            <div class="column container chartContainer">
              <h2>Activity & Intake</h2>
              <div class="metricToggles" id="activityToggles"></div>
              <div class="chartWrap chartWrapBig"><canvas id="activityChart"></canvas></div>
            </div>
          </div>

          <div class="row">
            <div class="column container chartContainer">
              <h2>Body</h2>
              <div class="metricToggles" id="bodyToggles"></div>
              <div class="chartWrap"><canvas id="bodyChart"></canvas></div>
            </div>
          </div>

          <div class="row">
            <div class="column container chartContainer">
              <h2>Heart & Blood Pressure</h2>
              <div class="metricToggles" id="heartToggles"></div>
              <div class="chartWrap chartWrapBig"><canvas id="heartChart"></canvas></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/browseData.js"></script>
  </body>
</html>
